<h1>TGA Origin Exporter</h1>
<p>Export TGA images with Bottom-Left or Top-Left origin.</p>
<h2>Usage</h2>
<ol>
<li>Open an image in Krita</li>
<li>Go to <b>Tools &gt; Scripts &gt; Export TGA with Origin...</b></li>
<li>Choose origin, click Export, pick save location</li>
</ol>
</body>
